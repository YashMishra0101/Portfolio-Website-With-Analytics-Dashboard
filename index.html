    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00f0ff',
                        electric: '#7e22ce',
                        plasma: '#f472b6',
                        dark: '#020617',
                        slate: '#0f172a'
                    },
                    fontFamily: {
                        grotesk: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'gradient': 'gradient 8s ease infinite',
                        'pulse-slow': 'pulse 5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        gradient: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image:
                radial-gradient(at 80% 20%, hsla(189, 100%, 56%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.1) 0px, transparent 50%);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .glow-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.36);
        }

        .link-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right,
                    rgba(0, 240, 255, 0) 0%,
                    rgba(0, 240, 255, 0) 35%,
                    rgba(0, 240, 255, 0.1) 45%,
                    rgba(0, 240, 255, 0) 55%,
                    rgba(0, 240, 255, 0) 100%);
            transform: rotate(30deg);
            transition: all 0.7s cubic-bezier(0.39, 0.575, 0.565, 1);
            opacity: 0;
        }

        .link-card:hover::before {
            opacity: 1;
            top: -30%;
            left: -30%;
        }

        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .avatar-container {
            background: linear-gradient(135deg, #00f0ff 0%, #7e22ce 50%, #f472b6 100%);
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
            padding: 3px;
        }

        .tech-bubble {
            animation: float 6s ease-in-out infinite;
            animation-delay: calc(var(--order) * 0.2s);
        }

        .neon-text {
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        .gradient-text {
            background: linear-gradient(90deg, #00f0ff 0%, #7e22ce 50%, #f472b6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
        }

        .pulse-ring {
            animation: pulse-slow 4s infinite;
        }

        @keyframes hologram {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 0.3;
            }
        }

        .hologram-line {
            position: absolute;
            height: 1px;
            width: 100%;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            opacity: 0;
            animation: hologram 3s infinite;
            animation-delay: calc(var(--order) * 0.3s);
        }
    </style>
</head>
